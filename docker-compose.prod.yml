services:
  # ----------------------------------------------------------------------------
  # Servidores de Banco de Dados (PostgreSQL) - Sem portas expostas ao host
  # ----------------------------------------------------------------------------
  auth-postgres:
    image: postgres:15-alpine
    container_name: snooker-auth-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-snooker_auth}
      POSTGRES_USER: ${AUTH_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    volumes:
      - auth_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-postgres} -d ${AUTH_DB_NAME:-snooker_auth}"]
      interval: 5s
      timeout: 5s
      retries: 5

  profile-postgres:
    image: postgres:15-alpine
    container_name: snooker-profile-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${PROFILE_DB_NAME:-snooker_game}
      POSTGRES_USER: ${PROFILE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PROFILE_DB_PASSWORD:-postgres}
    volumes:
      - profile_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROFILE_DB_USER:-postgres} -d ${PROFILE_DB_NAME:-snooker_game}"]
      interval: 5s
      timeout: 5s
      retries: 5

  game-postgres:
    image: postgres:15-alpine
    container_name: snooker-game-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${GAME_DB_NAME:-snooker_game}
      POSTGRES_USER: ${GAME_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${GAME_DB_PASSWORD:-postgres}
    volumes:
      - game_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GAME_DB_USER:-postgres} -d ${GAME_DB_NAME:-snooker_game}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Inicializador de Banco de Dados de Perfil
  # ----------------------------------------------------------------------------
  profile-db-init:
    image: postgres:15-alpine
    container_name: snooker-profile-db-init-prod
    depends_on:
      profile-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${PROFILE_DB_PASSWORD:-postgres}
      PROFILE_DB_NAME: ${PROFILE_DB_NAME:-snooker_game}
      PROFILE_LEGACY_DB_NAME: ${PROFILE_LEGACY_DB_NAME:-snooker_profile}
      PROFILE_DB_USER: ${PROFILE_DB_USER:-postgres}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:3000/snooker-profiles}
    volumes:
      - ./profile/scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/init-profile-db.sh"]

  # ----------------------------------------------------------------------------
  # Object Storage (MinIO) & Inicializador de Buckets (Acesso via Nginx Proxy)
  # ----------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: snooker-minio-prod
    restart: always
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:3000}
    volumes:
      - minio_prod_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: snooker-minio-init-prod
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/${STORAGE_BUCKET_NAME:-snooker-profiles} || true &&
      mc anonymous set download local/${STORAGE_BUCKET_NAME:-snooker-profiles}"

  # ----------------------------------------------------------------------------
  # Message Broker (NATS)
  # ----------------------------------------------------------------------------
  nats:
    image: nats:alpine
    container_name: snooker-nats-prod
    restart: always
    command: ["-js"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Microsserviços de Backend (Go) - Isolados na rede interna
  # ----------------------------------------------------------------------------
  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    container_name: snooker-auth-prod
    restart: always
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${AUTH_ALLOWED_ORIGINS:-http://localhost:3000}
      - COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - DB_HOST=auth-postgres
      - DB_PORT=5432
      - DB_USER=${AUTH_DB_USER:-postgres}
      - DB_PASSWORD=${AUTH_DB_PASSWORD:-postgres}
      - DB_NAME=${AUTH_DB_NAME:-snooker_auth}
      - DB_SSLMODE=disable
    depends_on:
      auth-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  profile:
    build:
      context: .
      dockerfile: profile/Dockerfile
    container_name: snooker-profile-prod
    restart: always
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${PROFILE_ALLOWED_ORIGINS:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - AUTH_INTERNAL_URL=http://auth:8080
      - DB_HOST=profile-postgres
      - DB_PORT=5432
      - DB_USER=${PROFILE_DB_USER:-postgres}
      - DB_PASSWORD=${PROFILE_DB_PASSWORD:-postgres}
      - DB_NAME=${PROFILE_DB_NAME:-snooker_game}
      - DB_SSLMODE=disable
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_PUBLIC_BASE_URL=${STORAGE_PUBLIC_BASE_URL:-http://localhost:3000/snooker-profiles}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_BUCKET_NAME=${STORAGE_BUCKET_NAME:-snooker-profiles}
      - STORAGE_REGION=${STORAGE_REGION:-us-east-1}
      - STORAGE_USE_SSL=false
      - PROFILE_MAX_PHOTO_BYTES=${PROFILE_MAX_PHOTO_BYTES:-2097152}
    depends_on:
      profile-postgres:
        condition: service_healthy
      profile-db-init:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  game:
    build:
      context: .
      dockerfile: lobby/Dockerfile
    container_name: snooker-game-prod
    restart: always
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${GAME_ALLOWED_ORIGINS:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - DB_HOST=game-postgres
      - DB_PORT=5432
      - DB_USER=${GAME_DB_USER:-postgres}
      - DB_PASSWORD=${GAME_DB_PASSWORD:-postgres}
      - DB_NAME=${GAME_DB_NAME:-snooker_game}
      - DB_SSLMODE=disable
      - NATS_URL=nats://nats:4222
      - GAME_OWNER_DISCONNECT_TIMEOUT_SECONDS=${GAME_OWNER_DISCONNECT_TIMEOUT_SECONDS:-10}
      - PROFILE_INTERNAL_URL=http://profile:8080
    depends_on:
      game-postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      profile:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------------------------
  # Frontend de Produção (Compilado e servido via Nginx na porta externa 3000)
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: snooker-frontend-prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      auth:
        condition: service_healthy
      profile:
        condition: service_healthy
      game:
        condition: service_healthy

# ----------------------------------------------------------------------------
# Definição de volumes persistentes de produção
# ----------------------------------------------------------------------------
volumes:
  auth_postgres_prod_data:
  profile_postgres_prod_data:
  game_postgres_prod_data:
  minio_prod_data:
