apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: snooker
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: snooker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: snooker
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: snooker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: snooker
        app.kubernetes.io/version: v1.0.0
    spec:
      serviceAccountName: snooker-app
      containers:
        - name: auth
          image: maiconda/snooker-auth:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_ALLOWED_ORIGINS
            - name: COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_COOKIE_SECURE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: JWT_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: GOOGLE_CLIENT_ID
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: INTERNAL_API_KEY
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: AUTH_DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_DB_NAME
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: DB_SSLMODE
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
