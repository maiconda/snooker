apiVersion: v1
kind: Service
metadata:
  name: profile
  namespace: snooker
  labels:
    app.kubernetes.io/name: profile
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: snooker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: profile
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile
  namespace: snooker
  labels:
    app.kubernetes.io/name: profile
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: snooker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: profile
  template:
    metadata:
      labels:
        app.kubernetes.io/name: profile
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: snooker
        app.kubernetes.io/version: v1.0.0
    spec:
      serviceAccountName: snooker-app
      containers:
        - name: profile
          image: maiconda/snooker-profile:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: PROFILE_ALLOWED_ORIGINS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: JWT_SECRET
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: INTERNAL_API_KEY
            # Aponta para a API interna do microsserviço de autenticação (auth)
            # para validar permissões de sessão.
            - name: AUTH_INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_INTERNAL_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: PROFILE_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: PROFILE_DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: PROFILE_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: PROFILE_DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: PROFILE_DB_NAME
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: DB_SSLMODE
            #  Configuração para falar com o MinIO.
            # O 'STORAGE_ENDPOINT' diz onde está o MinIO dentro do cluster (minio:9000).
            - name: STORAGE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: STORAGE_ENDPOINT
            # 'STORAGE_PUBLIC_BASE_URL' é a URL externa pela qual o navegador do cliente vai carregar as fotos
            # (passando pelo Cloudflare Tunnel -> Ingress -> Service -> MinIO).
            - name: STORAGE_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: STORAGE_PUBLIC_BASE_URL
            - name: STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: MINIO_ROOT_USER
            - name: STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: STORAGE_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: STORAGE_BUCKET_NAME
            - name: STORAGE_REGION
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: STORAGE_REGION
            - name: STORAGE_USE_SSL
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: STORAGE_USE_SSL
            - name: PROFILE_MAX_PHOTO_BYTES
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: PROFILE_MAX_PHOTO_BYTES
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
