apiVersion: v1
kind: Service
metadata:
  name: auth-postgres
  namespace: snooker
  labels:
    app.kubernetes.io/name: auth-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: snooker
spec:
  clusterIP: None # Torna o serviço Headless.
  selector:
    app.kubernetes.io/name: auth-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
# statefulSet do PostgreSQL do Auth
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-postgres
  namespace: snooker
  labels:
    app.kubernetes.io/name: auth-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: snooker
  annotations:
    snooker.maiconda.com/extra-points: "5.2 StatefulSet with dedicated persistent storage."
spec:
  serviceName: auth-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: snooker
    spec:
      serviceAccountName: snooker-data # Utiliza a ServiceAccount restrita de dados.
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            # Puxa o nome do banco do ConfigMap genérico
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_DB_NAME
            # Puxa o usuário do banco do ConfigMap genérico
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: AUTH_DB_USER
            # Puxa a senha (dado sensível) diretamente da Secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: AUTH_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: auth-postgres
          app.kubernetes.io/part-of: snooker
      spec:
        accessModes:
          - ReadWriteOnce # O volume só pode ser montado para leitura/escrita por um único nó por vez.
        storageClassName: local-path # StorageClass do K3s que salva os dados no disco local da máquina física.
        resources:
          requests:
            storage: 1Gi
---
