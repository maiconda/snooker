apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: snooker
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-storage
    app.kubernetes.io/part-of: snooker
spec:
  clusterIP: None # Headless Service.
  selector:
    app.kubernetes.io/name: minio
  ports:
    # Porta 9000 é a API S3 principal (usada pelo microsserviço profile e pelo front para ler imagens).
    - name: api
      port: 9000
      targetPort: api
    # Porta 9001 é o Console Web administrativo (painel visual do MinIO).
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: snooker
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-storage
    app.kubernetes.io/part-of: snooker
  annotations:
    snooker.maiconda.com/extra-points: "5.2 StatefulSet with dedicated persistent storage."
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: object-storage
        app.kubernetes.io/part-of: snooker
    spec:
      serviceAccountName: snooker-data # Roda sob a identidade restrita de dados.
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-06-06T09-36-42Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001 # Define em qual porta o Console Web vai escutar.
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snooker-secrets
                  key: MINIO_ROOT_PASSWORD
            # Configuramos CORS para permitir que o navegador do usuário
            # consiga renderizar ou enviar imagens diretamente, sem bloqueios de segurança do browser.
            - name: MINIO_API_CORS_ALLOW_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: snooker-config
                  key: MINIO_API_CORS_ALLOW_ORIGIN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # O MinIO expõe rotas HTTP prontas de diagnóstico de saúde.
          # Usamos 'httpGet' na porta da API REST para validar a saúde do serviço.
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data # Ponto de montagem onde os objetos (buckets e arquivos) ficam salvos no container.
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: minio
          app.kubernetes.io/part-of: snooker
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path # Persistent Volume Claim dinâmico com local-path do K3s.
        resources:
          requests:
            storage: 5Gi # Espaço reservado para armazenamento de imagens de perfil.
