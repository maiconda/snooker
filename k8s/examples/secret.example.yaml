apiVersion: v1
kind: Secret
metadata:
  name: snooker-secrets
  namespace: snooker
  labels:
    app.kubernetes.io/name: snooker-secrets
    app.kubernetes.io/part-of: snooker
type: Opaque
stringData:
  # Insira uma chave secreta forte para assinatura do JWT (ex: openssl rand -hex 32)
  JWT_SECRET: 'your_jwt_secret_here'
  # Token de comunicação interna entre microsserviços
  INTERNAL_API_KEY: 'your_internal_api_key_here'
  # Google Client ID obtido do console de credenciais do Google Cloud
  GOOGLE_CLIENT_ID: 'your_google_client_id.apps.googleusercontent.com'
  # Senha para o banco de dados de autenticação
  AUTH_DB_PASSWORD: 'your_auth_db_password_here'
  # Senha para o banco de dados de perfil de usuários
  PROFILE_DB_PASSWORD: 'your_profile_db_password_here'
  # Senha para o banco de dados do game/lobby
  GAME_DB_PASSWORD: 'your_game_db_password_here'
  # Usuário root administrativo do MinIO
  MINIO_ROOT_USER: 'minioadmin'
  # Senha administrativa do MinIO (mínimo de 8 caracteres)
  MINIO_ROOT_PASSWORD: 'minio_root_password_here'
