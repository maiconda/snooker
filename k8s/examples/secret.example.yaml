apiVersion: v1
kind: Secret
metadata:
  name: snooker-secrets
  namespace: snooker
  labels:
    app.kubernetes.io/name: snooker-secrets
    app.kubernetes.io/part-of: snooker
type: Opaque
stringData:
  JWT_SECRET: "replace-with-a-long-random-jwt-secret"
  INTERNAL_API_KEY: "replace-with-a-long-random-internal-api-key"
  GOOGLE_CLIENT_ID: "replace-with-google-client-id.apps.googleusercontent.com"
  AUTH_DB_PASSWORD: "replace-with-auth-db-password"
  PROFILE_DB_PASSWORD: "replace-with-profile-db-password"
  GAME_DB_PASSWORD: "replace-with-game-db-password"
  MINIO_ROOT_USER: "replace-with-minio-root-user"
  MINIO_ROOT_PASSWORD: "replace-with-minio-root-password"
