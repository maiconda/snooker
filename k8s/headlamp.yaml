# ServiceAccount para acesso administrativo do Headlamp
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: snooker
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: snooker
---
# Criamos um Secret do tipo 'service-account-token' para gerar um token estático.
# Desde a v1.24 do Kubernetes, tokens de ServiceAccount não são criados sozinhos,
# por isso este manifesto é essencial para obtermos o token e logarmos no Headlamp.
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin-token
  namespace: snooker
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: snooker
type: kubernetes.io/service-account-token
---
# O ClusterRoleBinding associa a ServiceAccount ao papel global de 'cluster-admin',
# permitindo que o painel do Headlamp tenha visibilidade e permissões totais no cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin-binding
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: snooker
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: snooker
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
# Ingress específico para o Headlamp, encaminhando o tráfego do subdomínio público
# para o serviço do Headlamp (porta 80) no cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: snooker
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: snooker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: headlamp.maiconda.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 80
---
# Política de Rede para o Headlamp.
# Como o baseline do namespace é default-deny-all (bloqueia tudo), precisamos liberar:
# 1. Entrada (Ingress) apenas do Traefik (que roda no namespace kube-system) na porta interna 4466.
# 2. Saída (Egress) livre (- {}) para o Headlamp falar com a API do Kubernetes (apiserver) e CoreDNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-headlamp-traffic
  namespace: snooker
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: snooker
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 4466
  egress:
    - {}

# comando util para recuperar token headlamp
# kubectl -n snooker get secret headlamp-admin-token -o jsonpath='{.data.token}' | base64 --decode