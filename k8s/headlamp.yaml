apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: snooker
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: snooker
---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin-token
  namespace: snooker
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: snooker
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin-binding
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: snooker
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: snooker
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
