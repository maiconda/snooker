# ServiceAccounts identificam a identidade de execução de cada pod.
# Seguindo boas práticas de segurança, dividimos em papéis (app, data, job).
# O automountServiceAccountToken é configurado como false pois esses pods não precisam
# interagir com a API interna do Kubernetes. Isso previne o roubo de tokens do cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snooker-app
  namespace: snooker
  labels:
    app.kubernetes.io/name: snooker
    app.kubernetes.io/part-of: snooker
automountServiceAccountToken: false
---
# ServiceAccount dedicada aos bancos de dados e MinIO
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snooker-data
  namespace: snooker
  labels:
    app.kubernetes.io/name: snooker-data
    app.kubernetes.io/part-of: snooker
automountServiceAccountToken: false
---
# ServiceAccount dedicada aos Jobs de inicialização
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snooker-job
  namespace: snooker
  labels:
    app.kubernetes.io/name: snooker-job
    app.kubernetes.io/part-of: snooker
automountServiceAccountToken: false
