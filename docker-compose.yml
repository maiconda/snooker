services:
  auth-postgres:
    image: postgres:15-alpine
    container_name: snooker-auth-postgres
    restart: always
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-snooker_auth}
      POSTGRES_USER: ${AUTH_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    ports:
      - "${AUTH_DB_PORT:-5432}:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-postgres} -d ${AUTH_DB_NAME:-snooker_auth}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    container_name: snooker-auth
    restart: always
    ports:
      - "${AUTH_PORT:-8081}:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${AUTH_ALLOWED_ORIGINS:-http://localhost:3000}
      - COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - DB_HOST=auth-postgres
      - DB_PORT=5432
      - DB_USER=${AUTH_DB_USER:-postgres}
      - DB_PASSWORD=${AUTH_DB_PASSWORD:-postgres}
      - DB_NAME=${AUTH_DB_NAME:-snooker_auth}
      - DB_SSLMODE=disable
    depends_on:
      auth-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  profile-postgres:
    image: postgres:15-alpine
    container_name: snooker-profile-postgres
    restart: always
    environment:
      POSTGRES_DB: ${PROFILE_DB_NAME:-snooker_game}
      POSTGRES_USER: ${PROFILE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PROFILE_DB_PASSWORD:-postgres}
    ports:
      - "${PROFILE_DB_PORT:-5433}:5432"
    volumes:
      - profile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROFILE_DB_USER:-postgres} -d ${PROFILE_DB_NAME:-snooker_game}"]
      interval: 5s
      timeout: 5s
      retries: 5

  profile-db-init:
    image: postgres:15-alpine
    container_name: snooker-profile-db-init
    depends_on:
      profile-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${PROFILE_DB_PASSWORD:-postgres}
      PROFILE_DB_NAME: ${PROFILE_DB_NAME:-snooker_game}
      PROFILE_LEGACY_DB_NAME: ${PROFILE_LEGACY_DB_NAME:-snooker_profile}
      PROFILE_DB_USER: ${PROFILE_DB_USER:-postgres}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:9005/snooker-profiles}
    volumes:
      - ./profile/scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/init-profile-db.sh"]

  minio:
    image: minio/minio:latest
    container_name: snooker-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:3000}
    ports:
      - "${MINIO_API_PORT:-9005}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: snooker-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/${STORAGE_BUCKET_NAME:-snooker-profiles} || true &&
      mc anonymous set download local/${STORAGE_BUCKET_NAME:-snooker-profiles}"

  profile:
    build:
      context: .
      dockerfile: profile/Dockerfile
    container_name: snooker-profile
    restart: always
    ports:
      - "${PROFILE_PORT:-8082}:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${PROFILE_ALLOWED_ORIGINS:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - AUTH_INTERNAL_URL=http://auth:8080
      - DB_HOST=profile-postgres
      - DB_PORT=5432
      - DB_USER=${PROFILE_DB_USER:-postgres}
      - DB_PASSWORD=${PROFILE_DB_PASSWORD:-postgres}
      - DB_NAME=${PROFILE_DB_NAME:-snooker_game}
      - DB_SSLMODE=disable
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_PUBLIC_BASE_URL=${STORAGE_PUBLIC_BASE_URL:-http://localhost:9005/snooker-profiles}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_BUCKET_NAME=${STORAGE_BUCKET_NAME:-snooker-profiles}
      - STORAGE_REGION=${STORAGE_REGION:-us-east-1}
      - STORAGE_USE_SSL=false
      - PROFILE_MAX_PHOTO_BYTES=${PROFILE_MAX_PHOTO_BYTES:-2097152}
    depends_on:
      profile-postgres:
        condition: service_healthy
      profile-db-init:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: node:24-alpine
    container_name: snooker-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      - VITE_AUTH_API_ORIGIN=/api
      - VITE_AUTH_PROXY_TARGET=http://auth:8080
      - VITE_PROFILE_API_ORIGIN=/api
      - VITE_PROFILE_PROXY_TARGET=http://profile:8080
      - VITE_GAME_API_ORIGIN=/api
      - VITE_GAME_PROXY_TARGET=http://game:8080
      - VITE_STORAGE_PROXY_TARGET=http://minio:9000
    command: sh -c "npm ci && npm run dev"
    depends_on:
      auth:
        condition: service_healthy
      profile:
        condition: service_healthy
      game:
        condition: service_healthy

  game-core:
    image: node:24-alpine
    container_name: snooker-game-core
    restart: always
    ports:
      - "${GAME_CORE_PORT:-3001}:3001"
    volumes:
      - ./game-core:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm ci && npx vite --host 0.0.0.0 --port 3001"

  game-postgres:
    image: postgres:15-alpine
    container_name: snooker-game-postgres
    restart: always
    environment:
      POSTGRES_DB: ${GAME_DB_NAME:-snooker_game}
      POSTGRES_USER: ${GAME_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${GAME_DB_PASSWORD:-postgres}
    ports:
      - "${GAME_DB_PORT:-5434}:5432"
    volumes:
      - game_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GAME_DB_USER:-postgres} -d ${GAME_DB_NAME:-snooker_game}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:alpine
    container_name: snooker-nats
    restart: always
    command: ["-js"]
    ports:
      - "${NATS_PORT:-4222}:4222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  game:
    build:
      context: .
      dockerfile: lobby/Dockerfile
    container_name: snooker-game
    restart: always
    ports:
      - "${GAME_PORT:-8083}:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${GAME_ALLOWED_ORIGINS:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - DB_HOST=game-postgres
      - DB_PORT=5432
      - DB_USER=${GAME_DB_USER:-postgres}
      - DB_PASSWORD=${GAME_DB_PASSWORD:-postgres}
      - DB_NAME=${GAME_DB_NAME:-snooker_game}
      - DB_SSLMODE=disable
      - NATS_URL=nats://nats:4222
      - GAME_OWNER_DISCONNECT_TIMEOUT_SECONDS=${GAME_OWNER_DISCONNECT_TIMEOUT_SECONDS:-10}
      - PROFILE_INTERNAL_URL=http://profile:8080
    depends_on:
      game-postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      profile:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  auth_postgres_data:
  profile_postgres_data:
  game_postgres_data:
  minio_data:
